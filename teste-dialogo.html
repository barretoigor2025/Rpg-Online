<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste — Diálogo Inline</title>
<style>
:root {
  --bg:    #06080f;
  --surf:  #0d1120;
  --surf2: #111828;
  --gold:  #c8a050;
  --text:  #c8d0e0;
  --text2: #8090a8;
  --text3: #4a5570;
  --border:rgba(88,104,160,.25);
  --green: #4caf50;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:Georgia,'Times New Roman',serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

/* topbar */
#topbar{flex-shrink:0;height:42px;display:flex;align-items:center;padding:0 16px;background:var(--surf);border-bottom:1px solid var(--border);font-size:11px;color:var(--gold);letter-spacing:2px;gap:8px;}

/* story */
#story{flex:1;overflow-y:auto;padding:12px 14px 8px;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth;}

/* mensagem GM — container da cena */
.msg-gm{background:rgba(12,16,28,.7);border-left:3px solid var(--gold);padding:10px 13px;border-radius:0 8px 8px 0;line-height:1.65;font-size:14px;color:#d8c8a8;display:flex;flex-direction:column;gap:6px;}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.msg-gm{animation:fadein .3s ease;}

/* chunk de narração */
.narr-chunk{line-height:1.75;color:#d8c8a8;font-size:14px;}

/* botão continuar entre chunks */
.btn-continuar-narr{display:block;margin:6px auto;background:none;border:1px solid rgba(200,160,80,.35);color:var(--gold);font-size:11px;padding:4px 18px;border-radius:20px;cursor:pointer;font-family:inherit;letter-spacing:1px;transition:all .15s;}
.btn-continuar-narr:hover{background:rgba(200,160,80,.1);border-color:var(--gold);}

/* DIÁLOGO INLINE — o coração do sistema */
.dialogo-inline{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:rgba(8,12,24,.7);border-left:2px solid rgba(200,160,80,.5);border-radius:0 6px 6px 0;}
.dialogo-inline-icon{flex-shrink:0;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid rgba(200,160,80,.2);}
.dialogo-inline-nome{font-size:9px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;}
.dialogo-inline-texto{font-size:13px;color:#ddd8c4;font-style:italic;line-height:1.6;}

/* bolha do jogador */
.msg-player{background:rgba(20,30,20,.45);border-left:2px solid rgba(76,175,80,.4);padding:8px 12px;border-radius:0 6px 6px 0;font-size:13px;animation:fadein .25s ease;}
.player-nome{font-size:9px;color:rgba(76,175,80,.7);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:3px;}
.player-fala{font-style:italic;color:#a0c0a0;line-height:1.55;}

/* opções de resposta */
#opcoes{flex-shrink:0;padding:8px 14px 10px;display:flex;flex-direction:column;gap:6px;background:var(--surf2);border-top:1px solid var(--border);}
#opcoes-label{font-size:9px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;padding-bottom:2px;}
.opcao-btn{background:rgba(14,18,32,.8);border:1px solid rgba(200,160,80,.18);color:#b0a070;border-radius:7px;padding:10px 14px;text-align:left;font-family:inherit;font-size:13px;cursor:pointer;transition:all .15s;line-height:1.4;}
.opcao-btn:hover{border-color:rgba(200,160,80,.5);color:var(--gold);background:rgba(200,160,80,.07);}
.opcao-btn:disabled{opacity:.3;cursor:default;}

#story-bottom{height:4px;flex-shrink:0;}
</style>
</head>
<body>

<div id="topbar">🗡️ Festival de Mhoried &nbsp;·&nbsp; <span style="color:var(--text2)">Teste do Sistema de Diálogo Inline</span></div>

<div id="story">
  <div id="story-bottom"></div>
</div>

<div id="opcoes">
  <div id="opcoes-label">Resposta do personagem</div>
</div>

<script>
// ── NPC DATA ──
const NPCS = {
  'Gregoras Pellos':   { icon:'🗡️', cor:'#607080' },
  'Duquesa Catherine': { icon:'👑', cor:'#b08030' },
  'Hobbleboot Sam':    { icon:'🥾', cor:'#5a7a4a' },
};

// ── CENAS ──
// Cada cena é uma sequência de items: texto narracao, fala NPC, e opções no final
const CENAS = {

  inicio: {
    sequencia: [
      { t: 'narr', txt: 'O festival de Mhoried fervilha ao redor da Arbor Aeterna. Barracas de mel, prata e seda bordejam a praça central. Entre a multidão, um homem de manto escuro se destaca — Sir Gregoras Pellos, guarda-costas pessoal da Duquesa.' },
      { t: 'narr', txt: 'Ele vos reconhece. Seus olhos varrem ao redor antes de se aproximar, voz baixa como seixo no fundo de um poço:' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'As Blackwoods começam a poucas milhas daqui. Preciso de aventureiros que não façam perguntas ao Rei Chutter. Oswald ainda está lá dentro — e não tenho mais tempo.' },
    ],
    opcoes: [
      { label:'🗣 "Quem é Oswald?"',                         prox:'oswald'       },
      { label:'🏰 "O que acontece no Castelo Negro?"',        prox:'castelo'      },
      { label:'💰 "Fale sobre a recompensa."',                prox:'recompensa'   },
      { label:'❌ "Não nos interessa."',                      prox:'recusa'       },
    ]
  },

  oswald: {
    player: '"Quem é Oswald?"',
    sequencia: [
      { t: 'narr', txt: 'A mandíbula de Gregoras se contrai. Por um instante ele desvia o olhar para a Arbor Aeterna — como se buscasse força na árvore ancestral.' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'Meu companheiro de patrulha. Dez anos servindo juntos nas muralhas de Mhoried. Entrou no Castelo Negro três semanas atrás para investigar os desaparecimentos. Nunca voltou.' },
      { t: 'narr', txt: 'Ele engole seco antes de continuar:' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'Mas vi fumaça ontem à noite. Torre leste, terceiro andar — o escritório do antigo Barão. Se há alguém sobrevivendo lá dentro, é Oswald.' },
    ],
    opcoes: [
      { label:'🔥 "Fumaça — significa que ele está vivo."',        prox:'fumaca'          },
      { label:'🧐 "Que desaparecimentos você mencionou?"',         prox:'desaparecimentos' },
      { label:'⚠️ "Por que o Rei proíbe investigações?"',          prox:'rei'             },
      { label:'🤝 "Iremos ao castelo."',                           prox:'aceitar'         },
    ]
  },

  castelo: {
    player: '"O que acontece no Castelo Negro?"',
    sequencia: [
      { t: 'narr', txt: 'Gregoras puxa os dois para trás de uma barraca de especiarias. Sua voz cai ainda mais — quase inaudível no burburinho do festival:' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'Luzes nas janelas à meia-noite. Sons que não vêm de humanos — crianças rindo onde não há crianças. E seis aldeões que caminharam para lá como em sonho. Nenhum voltou.' },
      { t: 'narr', txt: 'Ele hesita, como se o próximo pensamento o custasse algo:' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'O Barão Blackwood colecionava artefatos. A Duquesa viu a coleção uma vez — disse que alguns objetos a faziam sentir enjoada só de olhar. Se algo naquele castelo tem esse poder sobre pessoas...' },
    ],
    opcoes: [
      { label:'🔮 "Feitiço. Alguém está controlando as pessoas."', prox:'feitico'         },
      { label:'🧐 "Quem eram os aldeões desaparecidos?"',          prox:'desaparecimentos' },
      { label:'⚠️ "Por que o Rei proíbe investigações?"',          prox:'rei'             },
      { label:'🤝 "Entendido. Vamos entrar."',                     prox:'aceitar'         },
    ]
  },

  recompensa: {
    player: '"Fale sobre a recompensa."',
    sequencia: [
      { t: 'narr', txt: 'Um raro sorriso cruza o rosto seco de Gregoras. Não de alegria — de alívio, como homem que finalmente encontra quem precisava encontrar:' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'A Duquesa Catherine oferece cinquenta moedas de ouro por Oswald vivo. Mais vinte pelo que quer que esteja causando os desaparecimentos — prova ou cabeça, ela não especificou.' },
      { t: 'narr', txt: 'Ele cruza os braços e acrescenta, como se fosse detalhe menor:' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'Pessoalmente, posso adicionar minha palavra a qualquer causa futura de vocês. Uma indicação minha abre portas que ouro não abre em Mhoried. Considerem isso.' },
    ],
    opcoes: [
      { label:'🤝 "Aceitamos o trabalho."',                        prox:'aceitar'    },
      { label:'🗣 "Queremos mais informações primeiro."',           prox:'oswald'     },
      { label:'❌ "Não é suficiente para o risco."',               prox:'recusa'     },
    ]
  },

  desaparecimentos: {
    player: '"Que desaparecimentos? Quem sumiu?"',
    sequencia: [
      { t: 'narr', txt: 'Gregoras tira um pequeno pergaminho do bolso interno — passa discretamente, sem deixar ninguém ver:' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'Seis nomes. Um ferreiro, duas lavadeiras, um velho caçador e dois irmãos que colhiam cogumelos na borda da floresta. Todos foram vistos seguindo em direção ao castelo. Ninguém sabe dizer por quê.' },
      { t: 'narr', txt: 'Ele aponta discretamente para o pergaminho:' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'Testemunhas descrevem o mesmo: olhos vazios, passo uniforme. Como se fossem chamados por algo que não dava opção de recusa.' },
    ],
    opcoes: [
      { label:'🔮 "Isso é feitiço de compulsão."',                 prox:'feitico'  },
      { label:'🏰 "Como entramos no castelo?"',                    prox:'entrada'  },
      { label:'🤝 "Iremos ao castelo antes que piore."',           prox:'aceitar'  },
    ]
  },

  fumaca: {
    player: '"Fumaça na torre leste — ele está vivo então."',
    sequencia: [
      { t: 'narr', txt: 'Gregoras assente, lento, como se ainda tentasse se convencer disso:' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'Essa é minha esperança. A janela da torre leste é pequena demais para entrada. Mas há um aqueduto romano ao norte — passa por baixo dos muros. O Barão o usava para irrigação. Se não foi bloqueado, é caminho livre.' },
      { t: 'narr', txt: 'Ele traça no ar uma silhueta aproximada do terreno com o dedo, rápido e preciso:' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'Uma hora a pé pela floresta até as ruínas da bomba d\'água. De lá, o aqueduto leva direto ao pátio interno. Entrem pelos fundos. Evitem o portão principal — o que quer que esteja lá sabe que virão por ele.' },
    ],
    opcoes: [
      { label:'🤝 "Partimos ao anoitecer."',                       prox:'aceitar'  },
      { label:'⚠️ "Isso é perigoso demais sem mais informações."', prox:'rei'      },
    ]
  },

  feitico: {
    player: '"Isso é feitiço. Alguém está controlando essas pessoas."',
    sequencia: [
      { t: 'narr', txt: 'Gregoras arregala os olhos por uma fração de segundo — a mesma conclusão que ele havia resistido em nomear em voz alta. Silêncio por um momento.' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'Eu... não queria pensar nisso. Mas se você está certo, então cada dia que passa é mais um aldeão andando para aquela direção. E talvez Oswald já não seja mais Oswald.' },
      { t: 'narr', txt: 'Uma criança passa correndo perto deles, rindo. Gregoras segue o movimento com os olhos até ela sumir na multidão — como se o som da risada o lembrasse de algo que preferia esquecer:' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'Três noites atrás ouvi crianças rindo perto do castelo. Não havia crianças. O tipo de silêncio que veio depois fez meu cavalo recusar a andar por uma hora inteira.' },
    ],
    opcoes: [
      { label:'🏰 "Precisamos entrar antes que piore."',           prox:'aceitar'  },
      { label:'🔍 "Como desfazemos esse tipo de feitiço?"',        prox:'entrada'  },
    ]
  },

  rei: {
    player: '"Por que o Rei Chutter proíbe investigações?"',
    sequencia: [
      { t: 'narr', txt: 'Pela primeira vez, Gregoras olha genuinamente desconfortável. Ele abaixa a voz ao mínimo possível — praticamente lendo nos lábios:' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'O Barão Blackwood era credor do Rei. Documentos importantes estão naquele castelo — documentos que o Rei preferiria ver desaparecerem com o Barão. Uma investigação oficial atrairia atenção demais.' },
      { t: 'narr', txt: 'Ele encontra os olhos de cada um com uma franqueza dura, sem disfarce:' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'O que significa que vocês precisam entrar sem bandeiras, sem autorização. Como fantasmas. Se algo der errado, nunca nos conhecemos. Essa é a única promessa que posso fazer — e a única que vale alguma coisa.' },
    ],
    opcoes: [
      { label:'🤝 "Entendido. Somos fantasmas."',                  prox:'aceitar'  },
      { label:'⚠️ "Isso nos coloca em risco político real."',      prox:'risco'    },
      { label:'❌ "Não. É demais."',                               prox:'recusa'   },
    ]
  },

  entrada: {
    player: '"Como chegamos ao castelo sem sermos vistos?"',
    sequencia: [
      { t: 'narr', txt: 'Gregoras desdobra um pedaço de couro curtido com um mapa rudimentar riscado a carvão. O passa em menos de três segundos — só tempo suficiente para memorizar:' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'Aqueduto romano ao norte da floresta. Hora de caminhada pelas árvores, depois as ruínas da bomba d\'água. O túnel passa por baixo dos muros e sai no pátio interno, perto das cavalariças antigas.' },
      { t: 'narr', txt: 'Ele guarda o couro antes de terminar:' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'Levem luz própria. Levem corda. E levem algo para amarrar alguém que não queira ser resgatado. Oswald pode não ser mais o mesmo que conheci.' },
    ],
    opcoes: [
      { label:'🤝 "Partimos ao anoitecer."',                       prox:'aceitar'  },
    ]
  },

  risco: {
    player: '"Isso nos coloca em risco político real. Se algo der errado..."',
    sequencia: [
      { t: 'narr', txt: 'Gregoras encontra seus olhos. Sem raiva, sem pressa. Apenas aquela dureza de homem que já sopesou cada opção e ficou com a menos ruim:' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'Se algo der errado, você nunca me viu. A Duquesa nunca pediu nada. Essa é a verdade que o Rei aceitaria.' },
      { t: 'narr', txt: 'Uma pausa. Depois, mais baixo:' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'Mas se derem certo — Catherine tem longa memória para favores. E eu estarei aqui para confirmar cada palavra. Risco com recompensa, ou segurança com nada. É o único acordo que o mundo oferece.' },
    ],
    opcoes: [
      { label:'🤝 "Aceitamos o risco."',                          prox:'aceitar'  },
      { label:'❌ "Não. É demais pedir."',                        prox:'recusa'   },
    ]
  },

  aceitar: {
    player: '"Aceitamos. Iremos ao Castelo Negro."',
    sequencia: [
      { t: 'narr', txt: 'Um peso visível sai dos ombros de Gregoras. Ele aperta o pulso de cada um — curto, firme, sem palavras por um momento.' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'Que os deuses olhem por vocês. Oswald é um bom homem — não merece o que quer que esteja acontecendo lá dentro.' },
      { t: 'narr', txt: 'Ele afasta um passo, já se misturando de volta à multidão do festival. Antes de sumir entre as barracas, vira o rosto uma última vez:' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'Encontrem-me aqui amanhã ao amanhecer se voltarem. E... voltem.' },
    ],
    opcoes: [
      { label:'🔄 Recomeçar a cena',                               prox:'__restart__' },
    ]
  },

  recusa: {
    player: '"Não. Não é responsabilidade nossa."',
    sequencia: [
      { t: 'narr', txt: 'Gregoras assente, sem julgamento visível no rosto. Apenas aquela tristeza velha de homem acostumado a ouvir o que não quer.' },
      { t: 'fala', npc:'Gregoras Pellos', txt:'Entendo. Não era justo pedir. Se mudarem de ideia — estarei aqui até o pôr do sol. Depois disso, precisarei tentar outra coisa.' },
      { t: 'narr', txt: 'Ele se vira para ir. A multidão do festival engole sua silhueta escura lentamente, como água fechando sobre uma pedra.' },
    ],
    opcoes: [
      { label:'🤔 "Espere — conte-nos mais."',                     prox:'oswald'      },
      { label:'🔄 Recomeçar a cena',                               prox:'__restart__' },
    ]
  },
};

// ── ENGINE ──
let _cenaAtual = null;

function iniciar(cenaId) {
  if (cenaId === '__restart__') { location.reload(); return; }
  const cena = CENAS[cenaId];
  if (!cena) return;
  _cenaAtual = cena;

  // Bolha da fala do jogador
  if (cena.player) {
    const b = document.createElement('div');
    b.className = 'msg-player';
    b.innerHTML = `<div class="player-nome">⚔️ Seu personagem</div><div class="player-fala">${cena.player}</div>`;
    story.insertBefore(b, bottom);
  }

  // Container da cena (msg-gm)
  const container = document.createElement('div');
  container.className = 'msg-gm';
  story.insertBefore(container, bottom);

  // Esvazia opções enquanto constrói
  opcoes.innerHTML = '<div id="opcoes-label" style="font-size:9px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;padding-bottom:2px;">Resposta do personagem</div>';

  renderizarSequencia(container, cena.sequencia, () => mostrarOpcoes(cena.opcoes));
  scrollDown();
}

function renderizarSequencia(container, items, onFim) {
  let idx = 0;

  function proximo() {
    if (idx >= items.length) { onFim(); scrollDown(); return; }
    const it = items[idx++];

    if (it.t === 'narr') {
      const p = document.createElement('p');
      p.className = 'narr-chunk';
      p.textContent = it.txt;
      container.appendChild(p);
      scrollDown();

      // botão continuar antes do próximo item (exceto se for o último)
      if (idx < items.length) {
        const btn = document.createElement('button');
        btn.className = 'btn-continuar-narr';
        btn.textContent = '▶ Continuar';
        btn.onclick = () => { btn.remove(); proximo(); };
        container.appendChild(btn);
        scrollDown();
      } else {
        proximo();
      }
    } else if (it.t === 'fala') {
      const npc = NPCS[it.npc] || { icon:'👤', cor:'#4a5a70' };
      const d = document.createElement('div');
      d.className = 'dialogo-inline';
      d.innerHTML = `
        <div class="dialogo-inline-icon" style="background:${npc.cor}22">${npc.icon}</div>
        <div>
          <div class="dialogo-inline-nome">${it.npc}</div>
          <div class="dialogo-inline-texto">"${it.txt}"</div>
        </div>`;
      container.appendChild(d);
      scrollDown();

      // Após a fala, botão continuar — a não ser que seja o último item
      if (idx < items.length) {
        const btn = document.createElement('button');
        btn.className = 'btn-continuar-narr';
        btn.textContent = '▶ Continuar';
        btn.onclick = () => { btn.remove(); proximo(); };
        container.appendChild(btn);
        scrollDown();
      } else {
        proximo();
      }
    }
  }

  proximo();
}

function mostrarOpcoes(lista) {
  lista.forEach(op => {
    const btn = document.createElement('button');
    btn.className = 'opcao-btn';
    btn.textContent = op.label;
    btn.onclick = () => {
      opcoes.querySelectorAll('.opcao-btn').forEach(b => b.disabled = true);
      setTimeout(() => iniciar(op.prox), 150);
    };
    opcoes.appendChild(btn);
  });
  scrollDown();
}

function scrollDown() {
  setTimeout(() => bottom.scrollIntoView({ behavior:'smooth' }), 60);
}

const story  = document.getElementById('story');
const bottom = document.getElementById('story-bottom');
const opcoes = document.getElementById('opcoes');

// Primeira cena
setTimeout(() => iniciar('inicio'), 300);
</script>
</body>
</html>
