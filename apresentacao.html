<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Fera do Forte Negro — Classes, Personagens &amp; Bestiário</title>
<style>
  :root {
    --bg: #0e0b07;
    --panel: #1a140c;
    --border: #4a3820;
    --gold: #c8a040;
    --gold2: #e8c060;
    --text: #d8c898;
    --muted: #907860;
    --red: #8a2020;
    --green: #2a5a2a;
    --blue: #1a3a5a;
    --purple: #3a1a5a;
    --card-bg: #16110a;
    --modal-bg: #120e08;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #1a0e06 0%, var(--bg) 100%);
  }
  header h1 {
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    color: var(--gold2);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-shadow: 0 0 24px #c8a04055;
  }
  header p {
    margin-top: 0.5rem;
    color: var(--muted);
    font-style: italic;
    font-size: 0.95rem;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    margin: 2rem auto 0;
    max-width: 520px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .tab-btn {
    flex: 1;
    background: var(--panel);
    border: none;
    color: var(--muted);
    font-family: 'Georgia', serif;
    font-size: 1rem;
    padding: 0.75rem 1.5rem;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: background 0.2s, color 0.2s;
    border-right: 1px solid var(--border);
  }
  .tab-btn:last-child { border-right: none; }
  .tab-btn.active {
    background: #28200f;
    color: var(--gold2);
  }
  .tab-btn:hover:not(.active) {
    background: #20180a;
    color: var(--text);
  }

  /* ── SECTION HEADER ── */
  .section-title {
    text-align: center;
    padding: 2rem 1rem 0.5rem;
    color: var(--gold);
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
  }
  .section-title::before, .section-title::after {
    content: '';
    flex: 1;
    max-width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border));
  }
  .section-title::after {
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(168px, 1fr));
    gap: 1.25rem;
    max-width: 1280px;
    margin: 1.5rem auto 3rem;
    padding: 0 1.25rem;
  }

  /* ── CARD ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    border-color: var(--gold);
    transform: translateY(-3px);
    box-shadow: 0 6px 24px #00000088;
  }
  .card-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: contain;
    background: #0a0807;
    display: block;
    image-rendering: pixelated;
  }
  .card-body {
    padding: 0.65rem 0.75rem 0.75rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .card-name {
    font-size: 0.88rem;
    color: var(--gold2);
    line-height: 1.25;
    font-weight: bold;
  }
  .card-role {
    font-size: 0.75rem;
    color: var(--muted);
    font-style: italic;
    line-height: 1.3;
  }
  .card-badge {
    display: inline-block;
    margin-top: auto;
    padding: 0.18rem 0.5rem;
    border-radius: 3px;
    font-size: 0.68rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-family: monospace;
    align-self: flex-start;
  }
  .badge-aliado   { background: #1a3a1a; color: #60b060; border: 1px solid #2a5a2a; }
  .badge-neutro   { background: #2a2510; color: #c0a040; border: 1px solid #4a4020; }
  .badge-hostil   { background: #3a1010; color: #c04040; border: 1px solid #5a2020; }
  .badge-sombra   { background: #1a1030; color: #8060c0; border: 1px solid #3a2060; }
  .badge-besta    { background: #1a1505; color: #a07030; border: 1px solid #3a2a10; }
  .badge-construto{ background: #101828; color: #4090c0; border: 1px solid #2a4060; }
  .badge-undead   { background: #121220; color: #6060a0; border: 1px solid #303060; }
  .badge-planta   { background: #0e1a0a; color: #50a040; border: 1px solid #1a4010; }
  .badge-espirito { background: #101828; color: #60a0c0; border: 1px solid #2a5060; }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    padding: 0.75rem 1rem 0;
  }
  .filter-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.78rem;
    padding: 0.3rem 0.75rem;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'Georgia', serif;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: #28200f;
    color: var(--gold2);
    border-color: var(--gold);
  }

  /* ── MODAL ── */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: #000000cc;
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--modal-bg);
    border: 1px solid var(--gold);
    border-radius: 10px;
    max-width: 640px;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: 0 0 60px #00000099;
    animation: fadeUp 0.18s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .modal-header {
    display: flex;
    align-items: flex-start;
    gap: 1.25rem;
    padding: 1.5rem 1.5rem 1rem;
    border-bottom: 1px solid var(--border);
  }
  .modal-portrait {
    width: 110px;
    height: 110px;
    object-fit: contain;
    background: #0a0807;
    border: 1px solid var(--border);
    border-radius: 6px;
    flex-shrink: 0;
    image-rendering: pixelated;
  }
  .modal-title-block { flex: 1; }
  .modal-name {
    font-size: 1.25rem;
    color: var(--gold2);
    line-height: 1.2;
  }
  .modal-subtitle {
    color: var(--muted);
    font-style: italic;
    font-size: 0.88rem;
    margin-top: 0.3rem;
  }
  .modal-badges { margin-top: 0.6rem; display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.4rem;
    cursor: pointer;
    padding: 0 0.25rem;
    line-height: 1;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--gold2); }
  .modal-body { padding: 1.25rem 1.5rem 1.5rem; }
  .modal-section { margin-bottom: 1.1rem; }
  .modal-section-label {
    color: var(--gold);
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.25rem;
  }
  .modal-section p {
    color: var(--text);
    font-size: 0.9rem;
    line-height: 1.6;
  }
  .trait-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.2rem;
  }
  .trait {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.2rem 0.55rem;
    font-size: 0.78rem;
    color: var(--text);
  }

  /* ── PANEL (tab content) ── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── DIVIDERS ── */
  .faction-divider {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.75rem 0 0;
    font-style: italic;
  }

  /* ── CLASSES GRID ── */
  .classes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem;
    max-width: 1100px;
    margin: 1.5rem auto 3rem;
    padding: 0 1.25rem;
  }
  .class-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .class-card:hover {
    border-color: var(--gold);
    box-shadow: 0 6px 28px #00000099;
  }
  .class-portraits {
    display: flex;
    background: #0a0807;
    border-bottom: 1px solid var(--border);
  }
  .class-portrait {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0.75rem 0.5rem 0.5rem;
    gap: 0.3rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .class-portrait:hover { background: #12100a; }
  .class-portrait img {
    width: 120px;
    height: 120px;
    object-fit: contain;
    image-rendering: pixelated;
  }
  .class-portrait-label {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .class-divider {
    width: 1px;
    background: var(--border);
    align-self: stretch;
  }
  .class-info {
    padding: 1rem 1.25rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .class-title-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .class-icon { font-size: 1.5rem; }
  .class-name {
    font-size: 1.15rem;
    color: var(--gold2);
    letter-spacing: 0.05em;
  }
  .class-habilidade {
    font-size: 0.82rem;
    color: var(--muted);
    font-style: italic;
  }
  .class-habilidade strong { color: var(--gold); font-style: normal; }
  .class-desc {
    font-size: 0.88rem;
    color: var(--text);
    line-height: 1.6;
  }
  .class-powers {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .power-tag {
    background: #20180a;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.2rem 0.6rem;
    font-size: 0.76rem;
    color: var(--text);
  }
  .power-tag.habilidade {
    background: #28200a;
    border-color: var(--gold);
    color: var(--gold2);
  }

  /* ── BREATHING ANIMATION ── */
  @keyframes breathe {
    0%, 100% { transform: scaleY(1);     }
    45%, 55% { transform: scaleY(1.022); }
  }
  .breathe {
    transform-origin: bottom center;
    animation: breathe 3.8s ease-in-out infinite;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0a0807; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>⚔ A Fera do Forte Negro ⚔</h1>
  <p>Personagens &amp; Bestiário — Campanha Oráculo RPG</p>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('classes', this)">⚔ Classes</button>
    <button class="tab-btn" onclick="switchTab('npcs', this)">👥 Personagens</button>
    <button class="tab-btn" onclick="switchTab('enemies', this)">💀 Bestiário</button>
  </div>
</header>

<!-- ════════════════════════════════════════════ CLASSES TAB ════════════════════════════════════════════ -->
<div id="tab-classes" class="tab-panel active">
  <div class="section-title">Classes de Personagem</div>
  <div class="classes-grid" id="grid-classes"></div>
</div>

<!-- ════════════════════════════════════════════ NPCs TAB ════════════════════════════════════════════ -->
<div id="tab-npcs" class="tab-panel">
  <div class="section-title">Personagens da Campanha</div>

  <!-- Mhoried -->
  <div class="faction-divider">— Mhoried —</div>
  <div class="grid" id="grid-mhoried"></div>

  <!-- Blackwoods -->
  <div class="faction-divider">— As Blackwoods —</div>
  <div class="grid" id="grid-blackwoods"></div>

  <!-- Viajantes -->
  <div class="faction-divider">— Viajantes &amp; Errantes —</div>
  <div class="grid" id="grid-viajantes"></div>

  <!-- Figuras Sombrias -->
  <div class="faction-divider">— Figuras Sombrias —</div>
  <div class="grid" id="grid-sombrias"></div>
</div>

<!-- ════════════════════════════════════════════ ENEMIES TAB ════════════════════════════════════════════ -->
<div id="tab-enemies" class="tab-panel">
  <div class="section-title">Bestiário das Blackwoods</div>
  <div class="filter-bar" id="enemy-filters"></div>
  <div class="grid" id="grid-enemies"></div>
</div>

<!-- ════════════════════════════════════════════ MODAL ════════════════════════════════════════════ -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <img class="modal-portrait" id="modal-img" src="" alt="">
      <div class="modal-title-block">
        <div class="modal-name" id="modal-name"></div>
        <div class="modal-subtitle" id="modal-subtitle"></div>
        <div class="modal-badges" id="modal-badges"></div>
      </div>
      <button class="modal-close" onclick="document.getElementById('modal-backdrop').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════ CLASSES DATA ═══════════════════════════════════════════

const CLASSES = [
  {

    icon: '⚔️',
    habilidade: 'Ataque Extra',
    desc: 'Mestre das armas e da armadura, o Guerreiro é a força central do grupo. Com Ataque Extra, pode desferir múltiplos golpes num mesmo turno — um soldado disciplinado que vira o rumo de qualquer batalha.',

];

  mhoried: [
    {

    comportamento: 'Oportunista',
    tracos: ['Arqueiro', 'Oportunista', 'Foge se em desvantagem']
  },
];

// ═══════════════════════════════════════════ RENDER ═══════════════════════════════════════════

function badge(type) {
  const map = {
    aliado: ['badge-aliado', 'Aliado'],
    neutro: ['badge-neutro', 'Neutro'],
    hostil: ['badge-hostil', 'Hostil'],
    sombra: ['badge-sombra', 'Nas Sombras'],
    construto: ['badge-construto', 'Construto'],
    undead: ['badge-undead', 'Morto-Vivo'],
    besta: ['badge-besta', 'Besta'],
    planta: ['badge-planta', 'Planta'],
    espirito: ['badge-espirito', 'Espírito'],
  };
  const [cls, label] = map[type] || ['badge-neutro', type];
  return `<span class="card-badge ${cls}">${label}</span>`;
}

function renderNpcGrid(gridId, npcs) {
  const el = document.getElementById(gridId);
  el.innerHTML = npcs.map(n => `
    <div class="card" onclick="openNpcModal('${n.id}')">
      <img class="card-img" src="${n.sprite}" alt="${n.nome}" loading="lazy">
      <div class="card-body">
        <div class="card-name">${n.nome}</div>
        <div class="card-role">${n.titulo}</div>
        ${badge(n.alinhamento)}
      </div>
    </div>`).join('');
}

function renderEnemyGrid(filter) {
  const el = document.getElementById('grid-enemies');
  const list = filter === 'todos' ? ENEMIES : ENEMIES.filter(e => e.badge === filter);
  el.innerHTML = list.map(e => `
    <div class="card" onclick="openEnemyModal('${e.id}')">
      <img class="card-img" src="${e.sprite}" alt="${e.nome}" loading="lazy">
      <div class="card-body">
        <div class="card-name">${e.nome}</div>
        <div class="card-role">${e.tipo}</div>
        ${badge(e.badge)}
      </div>
    </div>`).join('');
}

function renderEnemyFilters() {
  const types = ['todos', 'besta', 'construto', 'undead', 'planta', 'espirito', 'hostil', 'neutro'];
  const labels = { todos: 'Todos', besta: 'Bestas', construto: 'Construtos', undead: 'Mortos-Vivos', planta: 'Plantas', espirito: 'Espíritos', hostil: 'Humanoides', neutro: 'Kobolds' };
  const el = document.getElementById('enemy-filters');
  el.innerHTML = types.map((t, i) =>
    `<button class="filter-btn ${i===0?'active':''}" onclick="filterEnemies('${t}', this)">${labels[t]}</button>`
  ).join('');
}

function filterEnemies(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderEnemyGrid(type);
  applyBreathing();
}

function applyBreathing() {
  document.querySelectorAll('.card-img, .class-portrait img').forEach(img => {
    if (img.classList.contains('breathe')) return;
    img.classList.add('breathe');
    img.style.animationDelay = -(Math.random() * 3.8).toFixed(2) + 's';
  });
}

// ═══════════════════════════════════════════ MODALS ═══════════════════════════════════════════

const NPC_MAP = {};
[...NPCS.mhoried, ...NPCS.blackwoods, ...NPCS.viajantes, ...NPCS.sombrias].forEach(n => NPC_MAP[n.id] = n);
const ENEMY_MAP = {};
ENEMIES.forEach(e => ENEMY_MAP[e.id] = e);

function openNpcModal(id) {
  const n = NPC_MAP[id];
  const mImg = document.getElementById('modal-img');
  mImg.src = n.sprite;
  mImg.classList.add('breathe');
  mImg.style.animationDelay = -(Math.random() * 3.8).toFixed(2) + 's';
  document.getElementById('modal-name').textContent = n.nome;
  document.getElementById('modal-subtitle').textContent = n.titulo;
  const badgeMap = { aliado: ['badge-aliado','Aliado'], neutro: ['badge-neutro','Neutro'], hostil: ['badge-hostil','Hostil'] };
  const [bc, bl] = badgeMap[n.alinhamento] || ['badge-neutro', n.alinhamento];
  document.getElementById('modal-badges').innerHTML = `<span class="card-badge ${bc}">${bl}</span>`;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-section">
      <div class="modal-section-label">Sobre</div>
      <p>${n.descricao}</p>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Aparência</div>
      <p>${n.aparencia}</p>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Personalidade</div>
      <p>${n.personalidade}</p>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Traços</div>
      <div class="trait-list">${n.tracos.map(t => `<span class="trait">${t}</span>`).join('')}</div>
    </div>`;
  document.getElementById('modal-backdrop').classList.add('open');
}

function openEnemyModal(id) {
  const e = ENEMY_MAP[id];
  const mImg = document.getElementById('modal-img');
  mImg.src = e.sprite;
  mImg.classList.add('breathe');
  mImg.style.animationDelay = -(Math.random() * 3.8).toFixed(2) + 's';
  document.getElementById('modal-name').textContent = e.nome;
  document.getElementById('modal-subtitle').textContent = e.tipo;
  const badgeMap = { construto: ['badge-construto','Construto'], undead: ['badge-undead','Morto-Vivo'], besta: ['badge-besta','Besta'], planta: ['badge-planta','Planta'], espirito: ['badge-espirito','Espírito'], hostil: ['badge-hostil','Humanoide'], neutro: ['badge-neutro','Kobold'] };
  const [bc, bl] = badgeMap[e.badge] || ['badge-neutro', e.badge];
  document.getElementById('modal-badges').innerHTML = `<span class="card-badge ${bc}">${bl}</span>`;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-section">
      <div class="modal-section-label">Descrição</div>
      <p>${e.descricao}</p>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Comportamento</div>
      <p>${e.comportamento}</p>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Características</div>
      <div class="trait-list">${e.tracos.map(t => `<span class="trait">${t}</span>`).join('')}</div>
    </div>`;
  document.getElementById('modal-backdrop').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-backdrop'))
    document.getElementById('modal-backdrop').classList.remove('open');
}

// ═══════════════════════════════════════════ TABS ═══════════════════════════════════════════

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ═══════════════════════════════════════════ INIT ═══════════════════════════════════════════

// Classes
(function renderClasses() {
  const el = document.getElementById('grid-classes');
  el.innerHTML = CLASSES.map(c => `
    <div class="class-card">
      <div class="class-portraits">
        <div class="class-portrait" onclick="openClassModal('${c.id}','m')">
          <img src="sprites/${c.id}_m.png" alt="${c.nome} ♂" loading="lazy">
          <span class="class-portrait-label">♂ Masculino</span>
        </div>
        <div class="class-divider"></div>
        <div class="class-portrait" onclick="openClassModal('${c.id}','f')">
          <img src="sprites/${c.id}_f.png" alt="${c.nome} ♀" loading="lazy">
          <span class="class-portrait-label">♀ Feminino</span>
        </div>
      </div>
      <div class="class-info">
        <div class="class-title-row">
          <span class="class-icon">${c.icon}</span>
          <span class="class-name">${c.nome}</span>
        </div>
        <div class="class-habilidade">Habilidade especial: <strong>${c.habilidade}</strong></div>
        <p class="class-desc">${c.desc}</p>
        <div class="class-powers">
          <span class="power-tag habilidade">${c.habilidade}</span>
          ${c.poderes.map(p => `<span class="power-tag">${p}</span>`).join('')}
        </div>
      </div>
    </div>`).join('');
})();

function openClassModal(id, sexo) {
  const c = CLASSES.find(x => x.id === id);
  const label = sexo === 'm' ? 'Masculino' : 'Feminino';
  const mImg = document.getElementById('modal-img');
  mImg.src = `sprites/${id}_${sexo}.png`;
  mImg.classList.add('breathe');
  mImg.style.animationDelay = -(Math.random() * 3.8).toFixed(2) + 's';
  document.getElementById('modal-name').textContent = c.nome;
  document.getElementById('modal-subtitle').textContent = `${c.icon} ${label}`;
  document.getElementById('modal-badges').innerHTML = `<span class="card-badge badge-neutro">${c.habilidade}</span>`;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-section">
      <div class="modal-section-label">Sobre a Classe</div>
      <p>${c.desc}</p>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Habilidade Especial</div>
      <p><strong style="color:var(--gold)">${c.habilidade}</strong></p>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Poderes</div>
      <div class="trait-list">${c.poderes.map(p => `<span class="trait">${p}</span>`).join('')}</div>
    </div>`;
  document.getElementById('modal-backdrop').classList.add('open');
}

renderNpcGrid('grid-mhoried',    NPCS.mhoried);
renderNpcGrid('grid-blackwoods', NPCS.blackwoods);
renderNpcGrid('grid-viajantes',  NPCS.viajantes);
renderNpcGrid('grid-sombrias',   NPCS.sombrias);
renderEnemyFilters();
renderEnemyGrid('todos');
applyBreathing();

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modal-backdrop').classList.remove('open');
});
</script>
</body>
</html>
