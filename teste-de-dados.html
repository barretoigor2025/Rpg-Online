<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Teste de Dados — Oráculo RPG</title>
<style>
  :root{--gold:#c8a050;--red:#bf1a0c;--fundo:#07090f;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--fundo);color:#e8e0d0;font-family:'Georgia',serif;
    display:flex;flex-direction:column;align-items:center;
    min-height:100vh;padding:24px 16px 48px;gap:18px;
  }
  h1{font-size:17px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-top:8px;}
  p.sub{font-size:11px;color:rgba(200,160,80,.5);letter-spacing:1px;text-align:center;}

  .btn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:400px;}
  .btn-dado{
    background:rgba(191,26,12,.1);border:1px solid rgba(191,26,12,.4);
    color:#ff7060;border-radius:8px;font-size:14px;padding:10px 6px;
    cursor:pointer;font-family:'Georgia',serif;transition:background .15s;
    display:flex;flex-direction:column;align-items:center;gap:3px;
  }
  .btn-dado:hover{background:rgba(191,26,12,.22);}
  .btn-dado span{font-size:9px;color:rgba(255,110,90,.45);letter-spacing:.5px;text-transform:uppercase;}
  .btn-cena{
    grid-column:span 3;background:rgba(200,160,80,.07);
    border:1px solid rgba(200,160,80,.2);color:rgba(200,160,80,.75);
    border-radius:8px;font-size:12px;padding:10px;
    cursor:pointer;font-family:'Georgia',serif;transition:background .15s;
  }
  .btn-cena:hover{background:rgba(200,160,80,.14);}

  #dado-overlay{
    display:none;position:fixed;inset:0;z-index:100;
    background:rgba(3,5,10,.93);backdrop-filter:blur(8px);
    align-items:center;justify-content:center;cursor:pointer;
  }
  #dado-overlay.ativo{display:flex;}
  #dado-card{
    display:flex;flex-direction:column;align-items:center;gap:10px;
    padding:22px 28px 20px;
    background:rgba(8,10,20,.92);border:1px solid rgba(191,26,12,.3);
    border-radius:18px;min-width:240px;max-width:320px;width:90vw;
    cursor:default;box-shadow:0 8px 48px rgba(0,0,0,.7),0 0 60px rgba(191,26,12,.1);
  }
  #dado-meta{font-size:10px;color:rgba(200,160,80,.55);letter-spacing:1.5px;text-transform:uppercase;text-align:center;min-height:14px;}
  #dice-canvas{border-radius:10px;display:block;}

  #dado-resultado{
    display:flex;flex-direction:column;align-items:center;gap:5px;
    opacity:0;transform:scale(.6) translateY(10px);
    transition:opacity .38s ease,transform .38s cubic-bezier(.15,.9,.25,1.2);
    min-height:72px;justify-content:center;
  }
  #dado-resultado.visivel{opacity:1;transform:scale(1) translateY(0);}
  #dado-numero{
    font-size:68px;font-weight:900;color:#fff;line-height:1;
    text-shadow:0 0 32px rgba(255,60,40,.85),0 2px 6px rgba(0,0,0,.7);
    letter-spacing:-3px;
  }
  #dado-detalhe{font-size:13px;color:rgba(255,255,255,.4);font-style:italic;min-height:18px;}
  #dado-veredicto{
    font-size:12px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
    padding:3px 16px;border-radius:4px;min-height:22px;
  }
  #dado-veredicto.acerto{color:#7adc7a;background:rgba(80,180,80,.1);border:1px solid rgba(100,200,100,.25);}
  #dado-veredicto.falha {color:#e06060;background:rgba(180,50,50,.1);border:1px solid rgba(200,80,80,.25);}
  #dado-hint{font-size:10px;color:rgba(200,160,80,.28);letter-spacing:1px;animation:piscar 1.6s ease infinite;}
  @keyframes piscar{0%,100%{opacity:.28}50%{opacity:.7}}

  .info-box{
    max-width:400px;width:100%;background:rgba(12,15,26,.7);
    border:1px solid rgba(200,160,80,.1);border-radius:10px;
    padding:14px 16px;font-size:12px;color:rgba(220,210,190,.5);line-height:1.75;
  }
  .info-box h3{font-size:10px;color:var(--gold);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:8px;}
  code{background:rgba(200,160,80,.1);color:rgba(200,160,80,.85);padding:0 4px;border-radius:3px;font-family:monospace;font-size:11px;}
</style>
</head>
<body>

<h1>⚄ Teste de Dados</h1>
<p class="sub">Animação 3D — Oráculo RPG</p>

<div class="btn-grid">
  <button class="btn-dado" onclick="lancar(4)">d4<span>tetraedro</span></button>
  <button class="btn-dado" onclick="lancar(6)">d6<span>cubo</span></button>
  <button class="btn-dado" onclick="lancar(8)">d8<span>octaedro</span></button>
  <button class="btn-dado" onclick="lancar(10)">d10<span>bipiramide</span></button>
  <button class="btn-dado" onclick="lancar(12)">d12<span>dodecaedro</span></button>
  <button class="btn-dado" onclick="lancar(20)">d20<span>icosaedro</span></button>
  <button class="btn-cena" onclick="cenaTestar('Aldric','Golpe de espada','FOR',3,13)">
    ⚔ Simular TESTAR — Aldric · Golpe de espada · FOR+3 vs CD 13
  </button>
  <button class="btn-cena" onclick="cenaTestar('Jufôncio','Corrida furtiva','DES',-1,15)">
    🌑 Simular TESTAR — Jufôncio · Corrida furtiva · DES-1 vs CD 15
  </button>
</div>

<div id="dado-overlay" onclick="fechar()">
  <div id="dado-card" onclick="event.stopPropagation()">
    <div id="dado-meta"></div>
    <canvas id="dice-canvas"></canvas>
    <div id="dado-resultado">
      <div id="dado-numero"></div>
      <div id="dado-detalhe"></div>
      <div id="dado-veredicto"></div>
    </div>
    <div id="dado-hint">toque para fechar</div>
  </div>
</div>

<div class="info-box">
  <h3>Integração com o jogo</h3>
  A IA usa <code>TESTAR: [Jogador|Ação|Atributo|CD]</code> — o sistema rola d20 + modificador vs CD.
  Esta animação aparecerá antes do desfecho narrativo.
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════
//  SETUP
// ═══════════════════════════════════════════════════
const SZ = Math.min(window.innerWidth * .74, 248) | 0;
const canvas = document.getElementById('dice-canvas');
canvas.width = canvas.height = SZ;

const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(SZ, SZ);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(38, 1, 1, 2000);
cam.position.set(0, 0, 350);

// Luzes
const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);
const key = new THREE.DirectionalLight(0xffe8cc, 1.15);
key.position.set(100, 180, 120); key.castShadow = true;
key.shadow.mapSize.set(512,512); scene.add(key);
const fill = new THREE.DirectionalLight(0xaad0ff, 0.38);
fill.position.set(-80, 40, 60); scene.add(fill);
const rim = new THREE.PointLight(0xff3311, 0.55, 900);
rim.position.set(-150, 80, -220); scene.add(rim);

// Plano de sombra
const shadowPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(600,600),
  new THREE.ShadowMaterial({opacity:.22})
);
shadowPlane.rotation.x = -Math.PI/2;
shadowPlane.position.y = -100;
shadowPlane.receiveShadow = true;
scene.add(shadowPlane);

// ═══════════════════════════════════════════════════
//  TEXTURAS — número em todas as faces
// ═══════════════════════════════════════════════════
function criarTexturaNumero(n) {
  const sz = 256;
  const c = document.createElement('canvas');
  c.width = c.height = sz;
  const ctx = c.getContext('2d');

  // Fundo vermelho com gradiente radial (iluminação simulada)
  const g = ctx.createRadialGradient(sz*.42, sz*.38, 0, sz*.5, sz*.5, sz*.72);
  g.addColorStop(0, '#d42010');
  g.addColorStop(0.6, '#b01808');
  g.addColorStop(1, '#650a04');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, sz, sz);

  // Número branco
  const fs = n >= 10 ? 108 : 126;
  ctx.font = `900 ${fs}px Georgia,serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = 'rgba(0,0,0,.55)';
  ctx.shadowBlur = 10;
  ctx.fillText(String(n), sz/2, sz/2 + 5);

  return new THREE.CanvasTexture(c);
}

// ═══════════════════════════════════════════════════
//  GEOMETRIAS
// ═══════════════════════════════════════════════════
function criarGeoD10() {
  // Bipiramide pentagonal: polo top + polo bottom + anel equatorial
  const verts = [];
  verts.push(0, 95, 0);   // 0 top
  verts.push(0, -95, 0);  // 1 bottom
  for (let i = 0; i < 5; i++) {
    const a = (Math.PI*2*i/5) - Math.PI/2;
    verts.push(74*Math.cos(a), 0, 74*Math.sin(a)); // 2..6
  }
  const idx = [];
  for (let i = 0; i < 5; i++) {
    idx.push(0, 2+i, 2+(i+1)%5);           // top
    idx.push(1, 2+(i+1)%5, 2+i);           // bottom (invertido)
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  return geo;
}

function obterGeo(lados) {
  if (lados === 4)  return new THREE.TetrahedronGeometry(72);
  if (lados === 6)  return new THREE.BoxGeometry(105,105,105);
  if (lados === 8)  return new THREE.OctahedronGeometry(72);
  if (lados === 10) return criarGeoD10();
  if (lados === 12) return new THREE.DodecahedronGeometry(68);
  if (lados === 20) return new THREE.IcosahedronGeometry(72, 0);
  return new THREE.IcosahedronGeometry(72, 0);
}

// ═══════════════════════════════════════════════════
//  CRIAR DADO
// ═══════════════════════════════════════════════════
function criarDado(lados, resultado) {
  const geo = obterGeo(lados);
  const tex = criarTexturaNumero(resultado);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;

  const mat = new THREE.MeshStandardMaterial({
    map: tex,
    roughness: 0.25,
    metalness: 0.06,
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = false;

  // Linhas brancas nas arestas
  const threshold = lados <= 6 ? 20 : lados <= 8 ? 20 : 30;
  const edges = new THREE.EdgesGeometry(geo, threshold);
  const lineMat = new THREE.LineBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.45,
  });
  const lines = new THREE.LineSegments(edges, lineMat);
  mesh.add(lines);

  return mesh;
}

// ═══════════════════════════════════════════════════
//  ANIMAÇÃO
// ═══════════════════════════════════════════════════
let _mesh = null;
let _raf  = null;
let _t0   = null;
let _svx  = 0, _svy = 0, _svz = 0;     // spin velocities (rad/s)
let _resultShown = false;
let _autoTimer   = null;

const FALL_END   = 1.15;  // die lands at this time
const SPIN_FAST  = 1.8;   // fast spin until here
const SPIN_STOP  = 2.35;  // fully stopped here — result shown at SPIN_STOP

function easeOutBounce(t) {
  if (t < 1/2.75)  return 7.5625*t*t;
  if (t < 2/2.75)  { t -= 1.5/2.75;  return 7.5625*t*t+.75; }
  if (t < 2.5/2.75){ t -= 2.25/2.75; return 7.5625*t*t+.9375; }
  t -= 2.625/2.75; return 7.5625*t*t+.984375;
}

let _lastTS = null;
function animLoop(ts) {
  if (!_t0) _t0 = ts;
  const dt = _lastTS ? (ts - _lastTS)/1000 : 0;
  _lastTS = ts;
  const t = (ts - _t0)/1000;

  if (_mesh) {
    // Queda com bounce
    const fallProg = Math.min(t / FALL_END, 1);
    _mesh.position.y = 300 - 300 * easeOutBounce(fallProg);

    // Tremor de câmera no impacto (70-85% da queda)
    const impactZone = fallProg > 0.70 && fallProg < 0.88;
    if (impactZone) {
      const intensity = (0.88 - fallProg) / 0.18;
      cam.position.x = (Math.random()-.5) * 7 * intensity;
      cam.position.y = (Math.random()-.5) * 5 * intensity;
    } else {
      cam.position.x *= 0.85;
      cam.position.y *= 0.85;
    }

    // Spin: rápido até SPIN_FAST, depois para bruscamente
    let spinMult;
    if (t < SPIN_FAST) {
      spinMult = 1.0;
    } else if (t < SPIN_STOP) {
      const prog = (t - SPIN_FAST) / (SPIN_STOP - SPIN_FAST);
      spinMult = Math.pow(1 - prog, 2.5); // desaceleração quadrática
    } else {
      spinMult = 0;
      if (!_resultShown) { _resultShown = true; mostrarResultado(); }
    }

    _mesh.rotation.x += _svx * spinMult * dt;
    _mesh.rotation.y += _svy * spinMult * dt;
    _mesh.rotation.z += _svz * spinMult * dt;
  }

  renderer.render(scene, cam);
  _raf = requestAnimationFrame(animLoop);
}

// Idle: gira devagar depois que o resultado aparece
function idleLoop(ts) {
  if (_mesh) {
    _mesh.rotation.x += 0.004;
    _mesh.rotation.y += 0.007;
  }
  cam.position.x *= 0.9;
  cam.position.y *= 0.9;
  renderer.render(scene, cam);
  _raf = requestAnimationFrame(idleLoop);
}

// ═══════════════════════════════════════════════════
//  RESULTADO
// ═══════════════════════════════════════════════════
let _opcoes = {};

function mostrarResultado() {
  const { resultado, mod, cd } = _opcoes;
  const total = resultado + (mod||0);

  const numEl  = document.getElementById('dado-numero');
  const detEl  = document.getElementById('dado-detalhe');
  const vered  = document.getElementById('dado-veredicto');
  const resDiv = document.getElementById('dado-resultado');

  numEl.textContent = cd != null ? String(total) : String(resultado);

  if (cd != null) {
    const ok = total >= cd;
    detEl.textContent = mod
      ? `${resultado} ${mod>=0?'+':''}${mod} = ${total} · CD ${cd}`
      : `${resultado} · CD ${cd}`;
    vered.textContent = ok ? '✦ ACERTO ✦' : '✕ FALHA ✕';
    vered.className   = ok ? 'acerto' : 'falha';
    numEl.style.textShadow = ok
      ? '0 0 34px rgba(100,230,100,.9),0 2px 6px rgba(0,0,0,.7)'
      : '0 0 34px rgba(230,80,80,.9),0 2px 6px rgba(0,0,0,.7)';
  } else {
    numEl.style.textShadow = '0 0 32px rgba(255,60,40,.85),0 2px 6px rgba(0,0,0,.7)';
  }

  resDiv.classList.add('visivel');

  // Trocar para idle
  if (_raf) cancelAnimationFrame(_raf);
  _raf = requestAnimationFrame(idleLoop);

  _autoTimer = setTimeout(fechar, 4500);
}

// ═══════════════════════════════════════════════════
//  API PÚBLICA
// ═══════════════════════════════════════════════════
function lancar(lados, opcoes={}) {
  const resultado = Math.floor(Math.random() * lados) + 1;
  _opcoes = { resultado, mod: opcoes.mod||0, cd: opcoes.cd??null };

  // Reset cena
  if (_mesh)  { scene.remove(_mesh); _mesh = null; }
  if (_raf)   { cancelAnimationFrame(_raf); _raf = null; }
  if (_autoTimer) { clearTimeout(_autoTimer); _autoTimer = null; }

  // Reset UI
  const resDiv = document.getElementById('dado-resultado');
  resDiv.classList.remove('visivel');
  ['dado-numero','dado-detalhe','dado-veredicto'].forEach(id => {
    document.getElementById(id).textContent = '';
    document.getElementById(id).className = '';
  });
  document.getElementById('dado-meta').textContent =
    opcoes.label || `Rolando d${lados}…`;

  // Criar dado
  _mesh = criarDado(lados, resultado);
  _mesh.position.set(0, 300, 0);
  scene.add(_mesh);

  // Velocidades de spin aleatórias — bastante rápidas
  const base = 18;
  _svx = (Math.random()-.5)*base + (Math.random()>0.5?8:-8);
  _svy = (Math.random()-.5)*base + (Math.random()>0.5?8:-8);
  _svz = (Math.random()-.5)*(base*.7);
  _t0  = null; _lastTS = null; _resultShown = false;

  // Abrir overlay e animar
  document.getElementById('dado-overlay').classList.add('ativo');
  _raf = requestAnimationFrame(animLoop);
}

function cenaTestar(nome, acao, attr, mod, cd) {
  lancar(20, { mod, cd, label:`${nome} · ${acao} · ${attr}${mod>=0?'+':''}${mod}` });
}

window.fechar = function() {
  if (_autoTimer) { clearTimeout(_autoTimer); _autoTimer = null; }
  document.getElementById('dado-overlay').classList.remove('ativo');
  if (_raf) { cancelAnimationFrame(_raf); _raf = null; }
  if (_mesh) { scene.remove(_mesh); _mesh = null; }
  cam.position.set(0,0,350);
  renderer.render(scene, cam);
};

document.addEventListener('keydown', e => { if(e.key==='Escape') fechar(); });
</script>
</body>
</html>
