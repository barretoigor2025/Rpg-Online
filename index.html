<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>RPG Online</title>
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>

<!-- ══ TELA LOBBY ══ -->
<div id="screen-lobby">
  <div class="lobby-box">
    <h1 class="logo">⚔ RPG Online</h1>

    <!-- Campanha ativa -->
    <div id="campaign-banner">
      <span id="campaign-name">📖 Carregando campanha...</span>
    </div>

    <!-- Chave API -->
    <div class="field-group" id="api-section">
      <label class="field-lbl">Chave API Groq</label>
      <div class="row-input">
        <input type="password" id="api-input" placeholder="gsk_...">
        <button class="btn-sm" onclick="salvarApiKey()">Salvar</button>
      </div>
      <span id="api-status" class="hint"></span>
    </div>

    <hr class="divider">

    <!-- Criar personagem -->
    <div class="field-group">
      <label class="field-lbl">Personagem</label>
      <input type="text" id="char-nome" placeholder="Nome do personagem" maxlength="24">

      <label class="field-lbl" style="margin-top:4px">Classe</label>
      <div id="class-grid">
        <button class="class-btn active" data-class="guerreiro">⚔️ Guerreiro</button>
        <button class="class-btn" data-class="mago">🔮 Mago</button>
        <button class="class-btn" data-class="ladino">🗡️ Ladino</button>
        <button class="class-btn" data-class="clerigo">✨ Clérigo</button>
        <button class="class-btn" data-class="barbaro">🪓 Bárbaro</button>
        <button class="class-btn" data-class="arqueiro">🏹 Arqueiro</button>
      </div>

      <!-- Preview: sprite + gênero + atributos AD&D -->
      <div id="char-preview">
        <div id="sprite-col">
          <img id="char-sprite" src="sprites/guerreiro_m.png" alt="" onerror="this.style.opacity='.3'">
          <div id="gender-toggle">
            <button class="gender-btn active" data-gender="m" onclick="toggleGenero('m')">♂</button>
            <button class="gender-btn" data-gender="f" onclick="toggleGenero('f')">♀</button>
          </div>
        </div>
        <div id="stats-col">
          <div class="dnd-attrs">
            <div class="attr-box"><span class="attr-lbl">FOR</span><span class="attr-val" id="prev-STR">16</span><span class="attr-mod" id="prev-STR-mod">+3</span></div>
            <div class="attr-box"><span class="attr-lbl">DES</span><span class="attr-val" id="prev-DEX">14</span><span class="attr-mod" id="prev-DEX-mod">+2</span></div>
            <div class="attr-box"><span class="attr-lbl">CON</span><span class="attr-val" id="prev-CON">15</span><span class="attr-mod" id="prev-CON-mod">+2</span></div>
            <div class="attr-box"><span class="attr-lbl">INT</span><span class="attr-val" id="prev-INT">10</span><span class="attr-mod" id="prev-INT-mod">0</span></div>
            <div class="attr-box"><span class="attr-lbl">SAB</span><span class="attr-val" id="prev-WIS">10</span><span class="attr-mod" id="prev-WIS-mod">0</span></div>
            <div class="attr-box"><span class="attr-lbl">CAR</span><span class="attr-val" id="prev-CHA">10</span><span class="attr-mod" id="prev-CHA-mod">0</span></div>
          </div>
          <div class="dnd-derived">
            <span>❤️ PV <strong id="prev-HP">14</strong></span>
            <span>🛡️ CA <strong id="prev-AC">17</strong></span>
            <span>⚡ Init <strong id="prev-Init">+2</strong></span>
          </div>
          <div class="dnd-saves">
            <span>Fort <strong id="prev-Fort">+4</strong></span>
            <span>Ref <strong id="prev-Ref">+2</strong></span>
            <span>Von <strong id="prev-Will">0</strong></span>
          </div>
          <div id="class-feature-lbl" class="feat-tag"></div>
        </div>
      </div>

      <label class="field-lbl" style="margin-top:4px">Perícias <span class="hint" style="text-transform:none;letter-spacing:0">(máx. 2)</span></label>
      <div id="adv-grid" class="adv-chips"></div>
    </div>

    <hr class="divider">

    <!-- Criar / Entrar -->
    <div class="room-actions">
      <button class="btn-primary" onclick="criarSala()">Criar Sala</button>
      <div class="row-input">
        <input type="text" id="code-input" placeholder="Código da sala" maxlength="6" style="text-transform:uppercase">
        <button class="btn-sm" onclick="entrarSala()">Entrar</button>
      </div>
    </div>

    <div id="lobby-error" class="error-msg"></div>
  </div>
</div>

<!-- ══ TELA DE JOGO ══ -->
<div id="screen-game" style="display:none">
  <!-- Topbar -->
  <div id="topbar">
    <div id="topbar-left">
      <span id="room-code"></span>
      <span id="round-display"></span>
    </div>
    <div id="topbar-right">
      <button id="voice-btn" class="icon-btn" onclick="toggleVoz()" title="Narração">🔊</button>
      <button class="icon-btn" onclick="toggleSkillsPanel()" title="Perícias">📜</button>
      <button class="icon-btn" onclick="resetarSala()" title="Resetar">↺</button>
    </div>
  </div>

  <!-- Lista de jogadores -->
  <div id="players-bar"></div>

  <!-- Área da história -->
  <div id="story-area">
    <div id="story-content"></div>
    <div id="story-bottom"></div>
  </div>

  <!-- Inimigos ativos (se em combate) -->
  <div id="enemies-bar" style="display:none"></div>

  <!-- Retry UI -->
  <div id="retry-ui" style="display:none">
    <span id="retry-msg"></span>
  </div>

  <!-- Input de ação -->
  <div id="action-bar">
    <div id="action-wrap">
      <textarea id="action-input" rows="2" placeholder="Declare a ação do seu personagem..."></textarea>
      <button id="btn-send" onclick="enviarAcao()">
        <span class="send-icon">✦</span>
      </button>
    </div>
    <div id="action-status"></div>
    <div id="btn-iniciar-wrap" style="display:none">
      <button id="btn-iniciar-narrar" class="btn-primary" onclick="chamarIAInicio()">⚔ Iniciar Aventura</button>
    </div>
  </div>
</div>

<!-- ══ MODAL API KEY ══ -->
<div id="modal-apikey" style="display:none">
  <div class="modal-box">
    <p>Insira sua chave Groq para continuar:</p>
    <input type="password" id="modal-api-input" placeholder="gsk_...">
    <button class="btn-primary" onclick="confirmarApiKeyModal()">Confirmar</button>
  </div>
</div>

<div id="toast"></div>
<div id="voice-indicator"></div>

<!-- ══ INTRO SLIDES ══ -->
<div id="intro-overlay" style="display:none">
  <div id="intro-card">
    <div id="intro-meta">
      <span id="intro-progress"></span>
      <span id="intro-icon"></span>
    </div>
    <h2 id="intro-titulo"></h2>
    <p id="intro-texto"></p>
    <div id="intro-nav">
      <button id="btn-intro-prev" class="btn-sm" onclick="voltarSlide()">◀ Voltar</button>
      <button id="btn-intro-next" class="btn-primary" onclick="avancarSlide()">Próximo ▶</button>
    </div>
  </div>
</div>

<!-- ══ PAINEL DE PERÍCIAS ══ -->
<div id="skills-panel" style="display:none"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
