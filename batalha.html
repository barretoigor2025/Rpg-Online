<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Batalha — Oráculo RPG</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a10;
      color: #e8d9b0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #14111c;
      border-bottom: 1px solid #2a2038;
      padding: 8px 12px;
      padding-top: max(8px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    header h1 { font-size: 15px; color: #c9a84c; flex: 1; }
    #token-count { font-size: 12px; color: #5a4830; }

    .hdr-btn {
      background: #1e1a2c;
      border: 1px solid #3a2e50;
      color: #c8b88a;
      border-radius: 7px;
      font-size: 16px;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .hdr-btn:active { background: #2d2840; }

    /* ── Map area ── */
    .map-area {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: #06060a;
      touch-action: none;
    }

    #map-viewport {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
    }

    #map-img {
      display: block;
      pointer-events: none;
      touch-action: none;
    }

    /* ── Placed tokens ── */
    .map-token {
      position: absolute;
      transform: translate(-50%, -100%);
      touch-action: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .map-token.dragging { opacity: 0.55; }

    /* shadow: em-flow abaixo do sprite clippado — representa o chão */
    .token-shadow {
      border-radius: 50%;
      border: 2px solid;
      pointer-events: none;
      transition: box-shadow .15s;
      flex-shrink: 0;
    }
    .map-token.selected .token-shadow {
      box-shadow: 0 0 10px 4px rgba(255,255,255,.3);
    }
    .map-token.type-player .token-shadow { border-color: #d4a844; background: rgba(212,168,68,.22); }
    .map-token.type-enemy  .token-shadow { border-color: #cc3a2a; background: rgba(204,58,42,.22); }
    .map-token.type-npc    .token-shadow { border-color: #9b59b6; background: rgba(155,89,182,.22); }

    .token-label {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 4px #000, 0 0 8px #000;
      pointer-events: none;
    }

    /* ── Floating action buttons above selected token ── */
    #tok-actions {
      position: absolute;
      display: none;
      gap: 6px;
      transform: translate(-50%, -100%);
      z-index: 50;
      pointer-events: all;
      margin-top: -10px;
    }
    .tok-act {
      background: #1e1a2c;
      border: 1px solid #4a3870;
      border-radius: 8px;
      color: #e8d9b0;
      font-size: 15px;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 10px rgba(0,0,0,.7);
      -webkit-tap-highlight-color: transparent;
    }
    .tok-act:active { background: #2d2840; }
    .tok-act.danger { color: #e88a8a; border-color: #7a2a2a; }
    .tok-act.danger:active { background: #3a1a1a; }

    /* ── Map placeholder ── */
    #map-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #2a2438;
      pointer-events: none;
    }
    #map-placeholder .icon { font-size: 60px; }
    #map-placeholder p { font-size: 14px; }

    /* ── Bottom tab bar ── */
    .tab-bar {
      flex-shrink: 0;
      display: flex;
      background: #14111c;
      border-top: 1px solid #2a2038;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .tab-btn {
      flex: 1;
      padding: 10px 4px 8px;
      text-align: center;
      background: none;
      border: none;
      color: #4a3a28;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn .ti { font-size: 22px; }
    .tab-btn .tl { font-size: 10px; }
    .tab-btn.active { color: #c9a84c; }

    /* ── Backdrop ── */
    #backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 100;
      display: none;
      touch-action: none;
    }
    #backdrop.show { display: block; }

    /* ── Bottom sheet ── */
    .bsheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #13101e;
      border-top: 1px solid #3a2e50;
      border-radius: 18px 18px 0 0;
      z-index: 110;
      transform: translateY(100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      max-height: 72dvh;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .bsheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 38px; height: 4px;
      background: #3a2e50;
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }
    .sheet-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #5a4830;
      padding: 8px 16px 6px;
      flex-shrink: 0;
    }
    .sheet-body {
      overflow-y: auto;
      flex: 1;
      padding: 0 12px 16px;
      -webkit-overflow-scrolling: touch;
    }
    .sheet-body::-webkit-scrollbar { display: none; }

    /* Cenários */
    .pack-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #5a4830;
      padding: 10px 2px 6px;
    }
    .map-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 4px;
    }
    .map-thumb {
      border: 2px solid transparent;
      border-radius: 9px;
      overflow: hidden;
      background: #0a0a0f;
      -webkit-tap-highlight-color: transparent;
      transition: border-color .15s;
    }
    .map-thumb.active { border-color: #c9a84c; }
    .map-thumb img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; pointer-events: none; }
    .map-thumb .mname {
      font-size: 9px;
      text-align: center;
      color: #6a5838;
      padding: 3px 4px 5px;
    }

    /* Fichas */
    .pal-cat-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #5a4830;
      padding: 10px 2px 6px;
    }
    .pal-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      margin-bottom: 4px;
    }
    .pal-tok {
      background: #1a1628;
      border: 1px solid #2a2038;
      border-radius: 7px;
      padding: 6px 3px 4px;
      text-align: center;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    .pal-tok:active { background: #241e34; border-color: #4a3860; }
    .pal-tok img {
      width: 44px; height: 58px;
      object-fit: contain;
      object-position: center bottom;
      display: block;
      margin: 0 auto;
      pointer-events: none;
      image-rendering: pixelated;
    }
    .pal-tok span {
      display: block;
      font-size: 8px;
      color: #7a6848;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    /* ── Drag ghost ── */
    #drag-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      display: none;
      transform: translate(-50%, -88%);
    }
    #drag-ghost img {
      width: 130px; height: 130px;
      object-fit: contain;
      object-position: center bottom;
      opacity: 0.80;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,1));
      image-rendering: pixelated;
    }
  </style>
</head>
<body>

<header>
  <h1>⚔️ Batalha</h1>
  <span id="token-count"></span>
  <button class="hdr-btn" onclick="limparTodos()" title="Limpar">🗑</button>
  <button class="hdr-btn" onclick="exportarJSON()" title="Exportar">📋</button>
</header>

<div class="map-area" id="map-area">
  <div id="map-viewport"></div>

  <div id="map-placeholder">
    <div class="icon">🗺️</div>
    <p>Toque em Cenários para começar</p>
  </div>

  <!-- Floating action bar, shown on token tap -->
  <div id="tok-actions">
    <button class="tok-act" id="act-rename">✏️</button>
    <button class="tok-act danger" id="act-remove">🗑</button>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn" id="tab-cenarios" onclick="openSheet('cenarios')">
    <span class="ti">🗺️</span><span class="tl">Cenários</span>
  </button>
  <button class="tab-btn" id="tab-fichas" onclick="openSheet('fichas')">
    <span class="ti">🎭</span><span class="tl">Fichas</span>
  </button>
  <button class="tab-btn" onclick="changeZoom(0.2)">
    <span class="ti">🔍</span><span class="tl">Zoom +</span>
  </button>
  <button class="tab-btn" onclick="changeZoom(-0.2)">
    <span class="ti">🔎</span><span class="tl">Zoom −</span>
  </button>
</div>

<!-- Backdrop -->
<div id="backdrop" ontouchstart="closeSheet()"></div>

<!-- Cenários sheet -->
<div class="bsheet" id="sheet-cenarios">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Escolha o Cenário</div>
  <div class="sheet-body" id="sc-body"></div>
</div>

<!-- Fichas sheet -->
<div class="bsheet" id="sheet-fichas">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Arraste uma ficha para o mapa</div>
  <div class="sheet-body" id="sf-body"></div>
</div>

<!-- Drag ghost -->
<div id="drag-ghost"><img id="dg-img" src="" alt=""></div>

// ─── State ────────────────────────────────────────────────────────────────────
let currentMap = null;
let tokens     = [];
let nextId     = 1;
let selectedId = null;

// Transform state (applied to #map-viewport via CSS transform)
let vp = { x: 0, y: 0, scale: 1 }; // top-left of viewport in map-area coords

// Drag state
let drag = null;
// { kind:'palette', sprite, name, tokenType }
// { kind:'token',   tokenId, offX, offY, startCx, startCy, moved }

// Gesture state (pan/pinch)
let gesture = null;
// { kind:'pan',   startTouchX, startTouchY, startVpX, startVpY }
// { kind:'pinch', startDist, startScale, midX, midY, startVpX, startVpY }

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const mapArea      = document.getElementById('map-area');
const mapViewport  = document.getElementById('map-viewport');
const dragGhost    = document.getElementById('drag-ghost');
const dgImg        = document.getElementById('dg-img');
const tokActions   = document.getElementById('tok-actions');
const placeholder  = document.getElementById('map-placeholder');
const tokenCount   = document.getElementById('token-count');

// ─── Build Cenários sheet ─────────────────────────────────────────────────────
const scBody = document.getElementById('sc-body');
MAP_PACKS.forEach(pack => {
  const lbl = document.createElement('div');
  lbl.className = 'pack-label';
  lbl.textContent = pack.label;
  scBody.appendChild(lbl);
  const grid = document.createElement('div');
  grid.className = 'map-grid';
  pack.maps.forEach(m => {
    const d = document.createElement('div');
    d.className = 'map-thumb';
    d.id = `thumb-${m.id}`;
    d.innerHTML = `<img src="${m.src}" loading="lazy" alt="${m.name}"><div class="mname">${m.name}</div>`;
    d.addEventListener('click', () => { selectMap(m); closeSheet(); });
    grid.appendChild(d);
  });
  scBody.appendChild(grid);
});

// ─── Build Fichas sheet ───────────────────────────────────────────────────────
const sfBody = document.getElementById('sf-body');
Object.entries(PALETTE).forEach(([cat, items]) => {
  const title = document.createElement('div');
  title.className = 'pal-cat-title';
  title.textContent = cat;
  sfBody.appendChild(title);
  const grid = document.createElement('div');
  grid.className = 'pal-grid';
  items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'pal-tok';
    el.innerHTML = `<img src="${item.sprite}" alt="${item.name}"><span>${item.name}</span>`;
    el.addEventListener('touchstart', e => startPaletteDrag(e, item), { passive: false });
    grid.appendChild(el);
  });
  sfBody.appendChild(grid);
});

// ─── Bottom sheet ─────────────────────────────────────────────────────────────
let openSheetId = null;
function openSheet(id) {
  if (openSheetId === id) { closeSheet(); return; }
  closeSheet();
  openSheetId = id;
  document.getElementById(`sheet-${id}`).classList.add('open');
  document.getElementById('backdrop').classList.add('show');
  document.getElementById(`tab-${id}`)?.classList.add('active');
}
function closeSheet() {
  if (!openSheetId) return;
  document.getElementById(`sheet-${openSheetId}`)?.classList.remove('open');
  document.getElementById(`tab-${openSheetId}`)?.classList.remove('active');
  openSheetId = null;
  document.getElementById('backdrop').classList.remove('show');
}

// ─── Map ──────────────────────────────────────────────────────────────────────
function getMapImg() { return document.getElementById('map-img'); }

function selectMap(m) {
  currentMap = m;
  document.querySelectorAll('.map-thumb').forEach(el =>
    el.classList.toggle('active', el.id === `thumb-${m.id}`));

  // Build img
  mapViewport.innerHTML = '';
  placeholder.style.display = 'none';

  const img = document.createElement('img');
  img.id   = 'map-img';
  img.src  = m.src;
  img.alt  = m.name;
  img.draggable = false;
  img.addEventListener('load', fitMap);
  mapViewport.appendChild(img);
}

function fitMap() {
  const img = getMapImg();
  if (!img) return;
  const aW = mapArea.offsetWidth;
  const aH = mapArea.offsetHeight;
  const iW = img.naturalWidth  || 600;
  const iH = img.naturalHeight || 600;
  const s  = Math.min(aW / iW, aH / iH) * 0.96;
  img.style.width  = iW + 'px';
  img.style.height = iH + 'px';
  vp.scale = s;
  vp.x = (aW - iW * s) / 2;
  vp.y = (aH - iH * s) / 2;
  applyVp();
  rerenderTokens();
}

function applyVp() {
  mapViewport.style.transform = `translate(${vp.x}px, ${vp.y}px) scale(${vp.scale})`;
}

// Convert viewport-space coords to image-ratio coords
function vpToRatio(cx, cy) {
  const img = getMapImg();
  if (!img) return { x: 0, y: 0 };
  const ix = (cx - vp.x) / vp.scale;
  const iy = (cy - vp.y) / vp.scale;
  return { x: ix / img.offsetWidth, y: iy / img.offsetHeight };
}

// ─── Tokens ───────────────────────────────────────────────────────────────────
function rerenderTokens() {
  document.querySelectorAll('.map-token').forEach(el => el.remove());
  tokens.forEach(tok => mountToken(tok));
  updateCount();
}

// Sprites 256×256 — base isométrica ocupa ~22% da parte inferior do sprite.
// Exibimos o sprite como quadrado e clippamos os 22% de baixo (base/pedestal),
// usando top:0 na img para que o TOPO do sprite fique visível e o fundo seja cortado.
const BASE_W = 130;   // largura base para escala medium (1.0) — preenche ~3 blocos
const CLIP   = 0.78;  // mostra 78% superiores do sprite (remove base do tile)

function mountToken(tok) {
  const s  = tok.scale ?? SZ.medium;
  const iw = Math.round(BASE_W * s);   // lado do sprite (quadrado)
  const ch = Math.round(iw * CLIP);    // altura do clip (sem a base)
  const sw = Math.round(iw * 0.55);    // largura da sombra
  const sh = Math.round(iw * 0.13);    // altura da sombra

  const el = document.createElement('div');
  el.className = `map-token type-${tok.type}${tok.id === selectedId ? ' selected' : ''}`;
  el.id = `tok-${tok.id}`;
  // wrapper overflow:hidden com top:0 na img → clipa o FUNDO (base), não o topo
  el.innerHTML = `
    <div style="width:${iw}px;height:${ch}px;overflow:hidden;position:relative;flex-shrink:0">
      <img src="${tok.sprite}" alt="${tok.name}"
        style="position:absolute;top:0;width:${iw}px;height:${iw}px;
               object-fit:contain;object-position:center top;
               image-rendering:pixelated;pointer-events:none;
               filter:drop-shadow(0 3px 8px rgba(0,0,0,.9))">
    </div>
    <div class="token-shadow" style="width:${sw}px;height:${sh}px"></div>
    <div class="token-label">${tok.name}</div>`;
  placeTokenEl(el, tok);
  el.addEventListener('touchstart', e => onTokenTouch(e, tok), { passive: false });
  mapViewport.appendChild(el);
}

function placeTokenEl(el, tok) {
  const img = getMapImg();
  if (!img) return;
  el.style.left = (tok.x * img.offsetWidth)  + 'px';
  el.style.top  = (tok.y * img.offsetHeight) + 'px';
}

function updateCount() {
  const p = tokens.filter(t => t.type === 'player').length;
  const e = tokens.filter(t => t.type === 'enemy').length;
  const n = tokens.filter(t => t.type === 'npc').length;
  const parts = [];
  if (p) parts.push(`🟡${p}`);
  if (e) parts.push(`🔴${e}`);
  if (n) parts.push(`🟣${n}`);
  tokenCount.textContent = parts.join(' ');
}

// ─── Token actions bar ────────────────────────────────────────────────────────
function showTokActions(tok) {
  selectedId = tok.id;
  document.querySelectorAll('.map-token').forEach(el =>
    el.classList.toggle('selected', el.id === `tok-${tok.id}`));

  const el = document.getElementById(`tok-${tok.id}`);
  if (!el) return;
  const elRect   = el.getBoundingClientRect();
  const areaRect = mapArea.getBoundingClientRect();
  const cx = elRect.left + elRect.width / 2 - areaRect.left;
  const cy = elRect.top - areaRect.top - 6;
  tokActions.style.left    = cx + 'px';
  tokActions.style.top     = cy + 'px';
  tokActions.style.display = 'flex';
}

function hideTokActions() {
  tokActions.style.display = 'none';
  selectedId = null;
  document.querySelectorAll('.map-token').forEach(el => el.classList.remove('selected'));
}

document.getElementById('act-rename').addEventListener('click', () => {
  const tok = tokens.find(t => t.id === selectedId);
  if (!tok) return;
  const novo = prompt('Novo nome:', tok.name);
  if (novo?.trim()) {
    tok.name = novo.trim();
    const lbl = document.querySelector(`#tok-${tok.id} .token-label`);
    if (lbl) lbl.textContent = tok.name;
  }
  hideTokActions();
});
document.getElementById('act-remove').addEventListener('click', () => {
  if (selectedId) removeToken(selectedId);
  hideTokActions();
});

// Tap on empty map → deselect
mapArea.addEventListener('touchend', e => {
  if (drag || gesture) return;
  if (!e.target.closest('.map-token') && !e.target.closest('#tok-actions'))
    hideTokActions();
}, { passive: true });

// ─── Palette drag ─────────────────────────────────────────────────────────────
function startPaletteDrag(e, item) {
  if (!currentMap) { alert('Selecione um cenário primeiro.'); return; }
  e.preventDefault();
  closeSheet();
  const t = e.touches[0];
  drag = { kind: 'palette', sprite: item.sprite, name: item.name, tokenType: item.type, scale: item.scale ?? SZ.medium };
  dgImg.src = item.sprite;
  dragGhost.style.display = 'block';
  moveDragGhost(t.clientX, t.clientY);
}

function moveDragGhost(x, y) {
  dragGhost.style.left = x + 'px';
  dragGhost.style.top  = y + 'px';
}

// ─── Token touch (drag or select) ────────────────────────────────────────────
function onTokenTouch(e, tok) {
  if (e.touches.length > 1) return;
  e.preventDefault();
  e.stopPropagation();
  const t = e.touches[0];
  const img = getMapImg();
  if (!img) return;
  // offset from token anchor (ratio) to cursor (ratio)
  const cur = vpToRatio(t.clientX - mapArea.getBoundingClientRect().left,
                        t.clientY - mapArea.getBoundingClientRect().top);
  drag = {
    kind: 'token', tokenId: tok.id,
    offX: cur.x - tok.x, offY: cur.y - tok.y,
    startCx: t.clientX, startCy: t.clientY, moved: false,
  };
  document.getElementById(`tok-${tok.id}`)?.classList.add('dragging');
}

// ─── Global touch handlers ────────────────────────────────────────────────────
mapArea.addEventListener('touchstart', onAreaTouchStart, { passive: false });
mapArea.addEventListener('touchmove',  onAreaTouchMove,  { passive: false });
mapArea.addEventListener('touchend',   onAreaTouchEnd,   { passive: true  });

function dist2(t1, t2) {
  const dx = t1.clientX - t2.clientX, dy = t1.clientY - t2.clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

function onAreaTouchStart(e) {
  const ts = Array.from(e.touches);

  if (ts.length === 2 && !drag) {
    e.preventDefault();
    gesture = {
      kind: 'pinch',
      startDist:  dist2(ts[0], ts[1]),
      startScale: vp.scale,
      startVpX:   vp.x, startVpY: vp.y,
      midX: (ts[0].clientX + ts[1].clientX) / 2 - mapArea.getBoundingClientRect().left,
      midY: (ts[0].clientY + ts[1].clientY) / 2 - mapArea.getBoundingClientRect().top,
    };
    return;
  }

  if (ts.length === 1 && !drag) {
    gesture = {
      kind: 'pan',
      startTouchX: ts[0].clientX, startTouchY: ts[0].clientY,
      startVpX: vp.x, startVpY: vp.y,
    };
  }
}

function onAreaTouchMove(e) {
  e.preventDefault();
  const ts = Array.from(e.touches);
  const aRect = mapArea.getBoundingClientRect();

  // Palette ghost
  if (drag?.kind === 'palette') {
    const t = ts[0] || e.changedTouches[0];
    moveDragGhost(t.clientX, t.clientY);
    return;
  }

  // Token drag
  if (drag?.kind === 'token') {
    const t = ts[0];
    const dx = t.clientX - drag.startCx, dy = t.clientY - drag.startCy;
    if (Math.sqrt(dx*dx+dy*dy) > 5) drag.moved = true;
    const pos = vpToRatio(t.clientX - aRect.left, t.clientY - aRect.top);
    const x = Math.max(0, Math.min(1, pos.x - drag.offX));
    const y = Math.max(0, Math.min(1, pos.y - drag.offY));
    const tok = tokens.find(t2 => t2.id === drag.tokenId);
    if (tok) {
      tok.x = x; tok.y = y;
      const el = document.getElementById(`tok-${tok.id}`);
      if (el) placeTokenEl(el, tok);
    }
    return;
  }

  // Pinch
  if (gesture?.kind === 'pinch' && ts.length === 2) {
    const d = dist2(ts[0], ts[1]);
    const ratio = d / gesture.startDist;
    const newScale = Math.max(0.25, Math.min(5, gesture.startScale * ratio));
    // Scale around pinch midpoint
    const mx = gesture.midX, my = gesture.midY;
    vp.x = mx - (mx - gesture.startVpX) * (newScale / gesture.startScale);
    vp.y = my - (my - gesture.startVpY) * (newScale / gesture.startScale);
    vp.scale = newScale;
    applyVp();
    rerenderTokens();
    return;
  }

  // Pan
  if (gesture?.kind === 'pan' && ts.length === 1) {
    vp.x = gesture.startVpX + (ts[0].clientX - gesture.startTouchX);
    vp.y = gesture.startVpY + (ts[0].clientY - gesture.startTouchY);
    applyVp();
    rerenderTokens();
  }
}

function onAreaTouchEnd(e) {
  // Palette drop
  if (drag?.kind === 'palette') {
    dragGhost.style.display = 'none';
    const t = e.changedTouches[0];
    const aRect = mapArea.getBoundingClientRect();
    const img = getMapImg();
    if (img) {
      const pos = vpToRatio(t.clientX - aRect.left, t.clientY - aRect.top);
      if (pos.x >= 0 && pos.x <= 1 && pos.y >= 0 && pos.y <= 1) {
        addToken(drag.tokenType, drag.name, drag.sprite, pos.x, pos.y, drag.scale);
      }
    }
    drag = null;
    gesture = null;
    return;
  }

  // Token drop
  if (drag?.kind === 'token') {
    const el = document.getElementById(`tok-${drag.tokenId}`);
    el?.classList.remove('dragging');
    if (!drag.moved) {
      const tok = tokens.find(t => t.id === drag.tokenId);
      if (tok) showTokActions(tok);
    }
    drag = null;
    gesture = null;
    return;
  }

  gesture = null;
}

// ─── Add / Remove ─────────────────────────────────────────────────────────────
function addToken(type, name, sprite, x, y, scale) {
  const tok = { id: nextId++, type, name, sprite, x, y, scale: scale ?? SZ.medium };
  tokens.push(tok);
  mountToken(tok);
  updateCount();
}

function removeToken(id) {
  tokens = tokens.filter(t => t.id !== id);
  document.getElementById(`tok-${id}`)?.remove();
  if (selectedId === id) selectedId = null;
  updateCount();
}

function limparTodos() {
  if (tokens.length && !confirm('Remover todos os tokens?')) return;
  tokens = [];
  document.querySelectorAll('.map-token').forEach(el => el.remove());
  hideTokActions();
  updateCount();
}

// ─── Zoom buttons ─────────────────────────────────────────────────────────────
function changeZoom(delta) {
  const cx = mapArea.offsetWidth  / 2;
  const cy = mapArea.offsetHeight / 2;
  const newScale = Math.max(0.25, Math.min(5, vp.scale + delta));
  const ratio = newScale / vp.scale;
  vp.x = cx - (cx - vp.x) * ratio;
  vp.y = cy - (cy - vp.y) * ratio;
  vp.scale = newScale;
  applyVp();
  rerenderTokens();
}

// ─── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', fitMap);

// ─── Export ───────────────────────────────────────────────────────────────────
function exportarJSON() {
  const data = {
    mapa: currentMap?.id || null,
    tokens: tokens.map(t => ({ type: t.type, name: t.name, sprite: t.sprite, x: +t.x.toFixed(4), y: +t.y.toFixed(4) })),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: `batalha-${currentMap?.id || 'mapa'}.json`,
  });
  a.click();
}
</script>
