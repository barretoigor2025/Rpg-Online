<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seletor de Estilo — RPG Online</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0e0f0d;
    color: #d4af6a;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px;
    gap: 24px;
  }

  h1 {
    font-size: 15px;
    letter-spacing: 5px;
    color: #d4af6a;
    text-align: center;
  }

  /* ── PRÉVIA ───────────────────────────────── */
  .preview {
    background: #121310;
    border: 1px solid #2a2010;
    border-radius: 10px;
    padding: 28px 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  #sprite-preview {
    width: 160px;
    height: 240px;
    image-rendering: pixelated;
    display: block;
  }

  .info {
    text-align: center;
    font-size: 11px;
    letter-spacing: 2px;
    color: #5a4a2a;
  }
  .info strong { color: #d4af6a; }

  /* ── PAINEL DE CONTROLES ──────────────────── */
  .controles {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 380px;
  }

  /* linha de seleção */
  .sel-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sel-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: #3a3020;
  }

  /* seletor ← valor → */
  .arrow-sel {
    display: flex;
    align-items: center;
    gap: 0;
    background: #141510;
    border: 1px solid #2a2010;
    border-radius: 6px;
    overflow: hidden;
  }
  .arrow-sel button {
    background: transparent;
    border: none;
    color: #7a6a4a;
    font-size: 18px;
    padding: 10px 18px;
    cursor: pointer;
    transition: color .15s, background .15s;
    flex-shrink: 0;
  }
  .arrow-sel button:hover { color: #d4af6a; background: #1e1a0d; }
  .arrow-sel .val {
    flex: 1;
    text-align: center;
    font-size: 12px;
    letter-spacing: 2px;
    color: #d4af6a;
    user-select: none;
  }

  /* indicador de cor */
  .cor-dot {
    display: inline-block;
    width: 12px; height: 12px;
    border-radius: 50%;
    margin-right: 7px;
    vertical-align: middle;
  }

  /* botões de classe */
  .class-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .btn-class {
    background: #141510;
    border: 1px solid #2a2010;
    color: #5a4a2a;
    font-family: inherit;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 8px 4px;
    cursor: pointer;
    border-radius: 5px;
    transition: all .15s;
  }
  .btn-class:hover { color: #d4af6a; border-color: #5a4a2a; }
  .btn-class.active { border-color: #d4af6a; color: #d4af6a; background: #1e1a0d; }

  /* botões de gênero */
  .gender-row { display: flex; gap: 8px; }
  .btn-gender {
    flex: 1;
    background: #141510;
    border: 1px solid #2a2010;
    color: #5a4a2a;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 9px;
    cursor: pointer;
    border-radius: 5px;
    transition: all .15s;
  }
  .btn-gender.active { border-color: #d4af6a; color: #d4af6a; background: #1e1a0d; }

  hr { border: none; border-top: 1px solid #1e1a0a; }
</style>
</head>
<body>

<h1>⚔ ESTILO DO PERSONAGEM</h1>

<!-- PRÉVIA -->
<div class="preview">
  <img id="sprite-preview" src="" alt="personagem">
  <div class="info" id="info-txt">—</div>
</div>

<!-- CONTROLES -->
<div class="controles">

  <div class="sel-row">
    <div class="sel-label">CLASSE</div>
    <div class="class-grid" id="class-grid"></div>
  </div>

  <div class="sel-row">
    <div class="sel-label">GÊNERO</div>
    <div class="gender-row">
      <button class="btn-gender active" id="btn-m" onclick="setGenero('m')">♂ MASCULINO</button>
      <button class="btn-gender"        id="btn-f" onclick="setGenero('f')">♀ FEMININO</button>
    </div>
  </div>

  <hr>

  <div class="sel-row">
    <div class="sel-label">CORTE DE CABELO</div>
    <div class="arrow-sel">
      <button onclick="mudar('estilo',-1)">&#8592;</button>
      <span class="val" id="val-estilo">—</span>
      <button onclick="mudar('estilo',+1)">&#8594;</button>
    </div>
  </div>

  <div class="sel-row">
    <div class="sel-label">COR DO CABELO</div>
    <div class="arrow-sel">
      <button onclick="mudar('cor',-1)">&#8592;</button>
      <span class="val" id="val-cor">—</span>
      <button onclick="mudar('cor',+1)">&#8594;</button>
    </div>
  </div>

</div>

<script>
const CLASSES = ['guerreiro','mago','ladino','clerigo','barbaro','arqueiro'];
const CLASSES_PT = { guerreiro:'GUERREIRO', mago:'MAGO', ladino:'LADINO',
                     clerigo:'CLÉRIGO', barbaro:'BÁRBARO', arqueiro:'ARQUEIRO' };

const ESTILOS = {
  m: ['classico','espetado','partido','baguncado','rabo_baixo'],
  f: ['classico','camadas','tranca_lateral','rabo_alto','coque_baixo']
};
const ESTILOS_PT = {
  classico:'CLÁSSICO', espetado:'ESPETADO', partido:'PARTIDO',
  baguncado:'BAGUNÇADO', rabo_baixo:'RABO BAIXO',
  camadas:'CAMADAS', tranca_lateral:'TRANÇA LAT.', rabo_alto:'RABO ALTO',
  coque_baixo:'COQUE BAIXO'
};

const CORES = ['preto','cinza','branco','vermelho','loiro','verde','azul'];
const CORES_PT = { preto:'PRETO', cinza:'CINZA', branco:'BRANCO',
                   vermelho:'VERMELHO', loiro:'LOIRO', verde:'VERDE', azul:'AZUL' };
const CORES_HEX = { preto:'#222', cinza:'#999', branco:'#eee',
                    vermelho:'#c0392b', loiro:'#d4af37', verde:'#27ae60', azul:'#2980b9' };

let estado = {
  classe: 'guerreiro',
  genero: 'm',
  iEstilo: 0,
  iCor: 0
};

function setGenero(g) {
  estado.genero = g;
  estado.iEstilo = 0;
  document.getElementById('btn-m').classList.toggle('active', g === 'm');
  document.getElementById('btn-f').classList.toggle('active', g === 'f');
  atualizar();
}

function mudar(campo, dir) {
  if (campo === 'estilo') {
    const n = ESTILOS[estado.genero].length;
    estado.iEstilo = (estado.iEstilo + dir + n) % n;
  } else {
    estado.iCor = (estado.iCor + dir + CORES.length) % CORES.length;
  }
  atualizar();
}

function atualizar() {
  const { classe, genero, iEstilo, iCor } = estado;
  const estilo = ESTILOS[genero][iEstilo];
  const cor    = CORES[iCor];

  const src = `compostos/${classe}_${genero}_${estilo}_${cor}.png`;
  document.getElementById('sprite-preview').src = src;

  // Labels
  document.getElementById('val-estilo').textContent = ESTILOS_PT[estilo];

  const dot = `<span class="cor-dot" style="background:${CORES_HEX[cor]}"></span>`;
  document.getElementById('val-cor').innerHTML = dot + CORES_PT[cor];

  document.getElementById('info-txt').innerHTML =
    `<strong>${CLASSES_PT[classe]}</strong> · ${genero === 'm' ? '♂' : '♀'} · ${ESTILOS_PT[estilo]} · ${CORES_PT[cor]}`;

  // classe buttons
  document.querySelectorAll('.btn-class').forEach(b =>
    b.classList.toggle('active', b.dataset.cls === classe));
}

// Build class grid
const grid = document.getElementById('class-grid');
CLASSES.forEach(c => {
  const b = document.createElement('button');
  b.className = 'btn-class' + (c === estado.classe ? ' active' : '');
  b.dataset.cls = c;
  b.textContent = CLASSES_PT[c];
  b.onclick = () => { estado.classe = c; atualizar(); };
  grid.appendChild(b);
});

atualizar();
</script>
</body>
</html>
